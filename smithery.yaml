# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options exposed in the Smithery UI.
    type: object
    required:
      - amadeusClientId
      - amadeusClientSecret
    properties:
      amadeusClientId:
        type: string
        description: Amadeus API Client ID
      amadeusClientSecret:
        type: string
        description: Amadeus API Client Secret
      mockMode:
        type: boolean
        # Exposes the server's graceful degradation engine as a first-class feature.
        # Users can test the full MCP integration without an Amadeus account.
        description: Set to true to use the local simulated travel engine (no API calls).
        default: false
  commandFunction:
    # Produces the CLI command to launch the MCP server on stdio transport.
    # Uses 'uv run' to match the package manager defined in pyproject.toml.
    |-
    (config) => ({
      command: 'uv',
      args: ['run', 'src/server.py'],
      env: {
        AMADEUS_CLIENT_ID: config.amadeusClientId,
        AMADEUS_CLIENT_SECRET: config.amadeusClientSecret,
        // Converts JS boolean to string — Python's os.getenv() returns strings, not booleans
        MOCK_MODE: config.mockMode ? 'true' : 'false'
      }
    })
  exampleConfig:
    amadeusClientId: your_dummy_client_id
    amadeusClientSecret: your_dummy_client_secret
    mockMode: true